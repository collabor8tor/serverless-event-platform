name: Full Stack Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/full-deploy.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/full-deploy.yml'

  backend-deploy:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.backend == 'true'

    env:
      AWS_REGION: us-east-1
      SAM_STACK_NAME: serverless-platform-dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Build and test backend
        working-directory: backend
        run: |
          mvn clean test
          sam build

      - name: Deploy backend
        working-directory: backend
        run: |
          sam deploy \
            --stack-name $SAM_STACK_NAME \
            --region $AWS_REGION \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM

  frontend-deploy:
    runs-on: ubuntu-latest
    needs: [detect-changes, backend-deploy]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.frontend == 'true' ||
      needs.detect-changes.outputs.backend == 'true'

    env:
      AWS_REGION: us-east-1
      SAM_STACK_NAME: serverless-platform-dev
      FRONTEND_BUCKET: ns-todo-ui-demo-2026

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve backend API URL from CloudFormation
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name $SAM_STACK_NAME \
            --region $AWS_REGION \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)

          echo "Resolved API_URL=$API_URL"
          echo "VITE_API_URL=$API_URL" >> $GITHUB_ENV

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/dist/ s3://$FRONTEND_BUCKET --delete
